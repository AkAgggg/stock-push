name: Stock Push

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
    - cron: '30 4 * * *'
    - cron: '50 6 * * *'

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run reports
        run: python stock_report.py morning
